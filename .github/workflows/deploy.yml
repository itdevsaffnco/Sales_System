name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FRONTEND_IMAGE: itsaffnco/saffnco_sales_system_frontend_app
  BACKEND_IMAGE: itsaffnco/saffnco_sales_system_backend_app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://server-sales.saffnco.app/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: BACKEND_ENV
          script: |
            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pull latest images
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest
            
            # Write .env.backend from secret
            mkdir -p ~/sales-system
            echo "$BACKEND_ENV" > ~/sales-system/.env.backend
            
            # Stop & remove existing containers
            docker stop saffnco_system_sales_backend saffnco_system_sales_frontend 2>/dev/null || true
            docker rm saffnco_system_sales_backend saffnco_system_sales_frontend 2>/dev/null || true
            
            # Run backend container
            docker run -d \
              --name saffnco_system_sales_backend \
              --restart unless-stopped \
              --network sales-network \
              --add-host=host.docker.internal:host-gateway \
              -p 8000:8000 \
              --env-file ~/sales-system/.env.backend \
              -v saffnco_backend_storage:/var/www/storage \
              ${{ env.BACKEND_IMAGE }}:latest
            
            # Run frontend container
            docker run -d \
              --name saffnco_system_sales_frontend \
              --restart unless-stopped \
              --network sales-network \
              -p 9800:80 \
              ${{ env.FRONTEND_IMAGE }}:latest
            
            # Run migrations
            docker exec saffnco_system_sales_backend php artisan migrate --force
            
            # Cleanup old images
            docker image prune -f
